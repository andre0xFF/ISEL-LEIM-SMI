services:
  app:
    container_name: rooted-app
    build:
      context: .
      dockerfile: Dockerfile

    volumes:
      - ..:/workspace:cached

    ports:
      - "8080:8080"

    depends_on:
      db:
        condition: service_healthy

    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: rooted
      DB_USER: root
      DB_PASSWORD: root

    command: sleep infinity

  db:
    container_name: rooted-db
    image: mysql:8.0
    restart: unless-stopped
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

    ports:
      - "3306:3306"

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rooted

    healthcheck:
      test:
        - "CMD"
        - "mysqladmin"
        - "ping"
        - "-h"
        - "localhost"
        - "-u"
        - "root"
        - "-proot"

      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
